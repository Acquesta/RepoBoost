kind = "web"
previewPath = "/"
title = "RepoBoost"
version = "1.0.0"
id = "artifacts/repoboost"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20154

[services.development]
run = "pnpm --filter @workspace/repoboost run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/repoboost", "run", "build" ]
publicDir = "artifacts/repoboost/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20154"
BASE_PATH = "/"
