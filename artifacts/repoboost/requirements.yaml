packages:
  "framer-motion": "Animations and beautiful page transitions"
  "react-markdown": "Rendering generated READMEs"
  "remark-gfm": "GitHub Flavored Markdown support for tables and lists"
  "date-fns": "Date formatting for generation history"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"
  "class-variance-authority": "For creating variant-based component APIs"

images:
